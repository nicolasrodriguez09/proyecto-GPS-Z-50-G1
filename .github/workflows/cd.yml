name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (github.event.workflow_run.head_branch == 'master' ||
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Define image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image_name="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          image_tag="${{ github.event.workflow_run.head_sha }}"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image_name }}:latest
            ${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.image_tag }}

      - name: Configure SSH access
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          deploy_port="${DEPLOY_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$deploy_port" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Copy production compose file
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          deploy_port="${DEPLOY_PORT:-22}"
          ssh -p "$deploy_port" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -P "$deploy_port" deploy/compose.production.yaml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/compose.production.yaml"

      - name: Deploy application
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          IMAGE_NAME: ${{ steps.image.outputs.image_name }}
          IMAGE_TAG: ${{ steps.image.outputs.image_tag }}
        run: |
          set -euo pipefail
          deploy_port="${DEPLOY_PORT:-22}"
          ghcr_pat_b64="$(printf '%s' "$GHCR_PAT" | base64 -w 0)"

          printf -v deploy_path_q '%q' "$DEPLOY_PATH"
          printf -v image_name_q '%q' "$IMAGE_NAME"
          printf -v image_tag_q '%q' "$IMAGE_TAG"
          printf -v ghcr_username_q '%q' "$GHCR_USERNAME"
          printf -v ghcr_pat_b64_q '%q' "$ghcr_pat_b64"

          ssh -p "$deploy_port" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH=$deploy_path_q IMAGE_NAME=$image_name_q IMAGE_TAG=$image_tag_q GHCR_USERNAME=$ghcr_username_q GHCR_PAT_B64=$ghcr_pat_b64_q bash -s" <<'REMOTE'
            set -euo pipefail
            cd "$DEPLOY_PATH"

            if [ ! -f .env.production ]; then
              echo "Missing $DEPLOY_PATH/.env.production on the server."
              exit 1
            fi

            printf '%s' "$GHCR_PAT_B64" | base64 -d | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            export IMAGE_NAME IMAGE_TAG

            docker compose --env-file .env.production -f compose.production.yaml pull
            docker compose --env-file .env.production -f compose.production.yaml up -d --remove-orphans

            for attempt in 1 2 3 4 5; do
              if docker compose --env-file .env.production -f compose.production.yaml exec -T app php artisan migrate --force; then
                break
              fi

              if [ "$attempt" -eq 5 ]; then
                echo "Database migrations failed after multiple attempts."
                exit 1
              fi

              sleep 10
            done

            docker compose --env-file .env.production -f compose.production.yaml exec -T app php artisan config:cache
            docker compose --env-file .env.production -f compose.production.yaml exec -T app php artisan view:cache
            docker image prune -f
          REMOTE

      - name: Run smoke test
        shell: bash
        env:
          DEPLOY_HEALTHCHECK_URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HEALTHCHECK_URL:-}" ]; then
            exit 0
          fi

          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error "$DEPLOY_HEALTHCHECK_URL"; then
              exit 0
            fi

            sleep 5
          done

          echo "Smoke test failed for $DEPLOY_HEALTHCHECK_URL"
          exit 1
