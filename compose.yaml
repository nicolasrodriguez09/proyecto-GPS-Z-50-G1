x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  image: alquiler-app:local
  env_file:
    - .env.docker
  depends_on:
    db:
      condition: service_healthy
  restart: unless-stopped
  volumes:
    - .:/var/www/html
    - app_storage:/var/www/html/storage

services:
  app:
    <<: *app-base
    ports:
      - "${APP_PORT:-8000}:80"

  queue:
    <<: *app-base
    command: php artisan queue:work --verbose --tries=3 --timeout=90

  db:
    image: mysql:8.4
    env_file:
      - .env.docker
    restart: unless-stopped
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  app_storage:
  mysql_data:
